name: Dart Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mariadb:
    name: MariaDB ${{ matrix.mariadb-version }} (${{ matrix.sdk }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        sdk: [3.6.0]
        mariadb-version: ['10.11', '11.8']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate SSL certificates
        run: |
          mkdir certs

          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout certs/ca-key.pem \
            -out certs/ca-cert.pem \
            -days 365 \
            -subj "/C=BR/ST=Rio de Janeiro/L=Rio das Ostras/O=PMRO/OU=ASCOMTI/CN=MyTestCA"

          openssl req -newkey rsa:2048 -nodes \
            -keyout certs/server-key.pem \
            -out certs/server-req.pem \
            -subj "/C=BR/ST=Rio de Janeiro/L=Rio das Ostras/O=PMRO/OU=ASCOMTI/CN=localhost"

          openssl x509 -req \
            -in certs/server-req.pem \
            -CA certs/ca-cert.pem \
            -CAkey certs/ca-key.pem \
            -CAcreateserial \
            -out certs/server-cert.pem \
            -days 365

      - name: Create MariaDB SSL config file
        run: |
          echo "[mysqld]" > my.cnf
          echo "ssl_ca=/etc/mysql/certs/ca-cert.pem" >> my.cnf
          echo "ssl_cert=/etc/mysql/certs/server-cert.pem" >> my.cnf
          echo "ssl_key=/etc/mysql/certs/server-key.pem" >> my.cnf
          echo "bind-address=0.0.0.0" >> my.cnf

      - name: Copy SSL certificates to MariaDB directory
        run: |
          sudo mkdir -p /etc/mysql/certs
          sudo cp certs/ca-cert.pem /etc/mysql/certs/
          sudo cp certs/server-cert.pem /etc/mysql/certs/
          sudo cp certs/server-key.pem /etc/mysql/certs/
          sudo chown mysql:mysql /etc/mysql/certs/ca-cert.pem /etc/mysql/certs/server-cert.pem /etc/mysql/certs/server-key.pem
          sudo chmod 644 /etc/mysql/certs/ca-cert.pem /etc/mysql/certs/server-cert.pem
          sudo chmod 600 /etc/mysql/certs/server-key.pem

      - name: Setup MariaDB
        uses: ankane/setup-mariadb@v1
        with:
          mariadb-version: ${{ matrix.mariadb-version }}
          database: banco_teste

      - name: Configure MariaDB for SSL
        run: |
          sudo cp my.cnf /etc/mysql/mariadb.conf.d/ssl.cnf
          sudo chown mysql:mysql /etc/mysql/mariadb.conf.d/ssl.cnf
          sudo systemctl restart mariadb

      - name: Verify MariaDB installation
        run: |
          mysql --version
          mysql -u root -e 'SELECT VERSION()'
          mysql -u root -e 'SHOW VARIABLES LIKE "have_ssl"'

      - name: Configure test user
        run: |
          mysql -u root -e "CREATE USER IF NOT EXISTS 'dart'@'%' IDENTIFIED BY 'dart';"
          mysql -u root -e "GRANT ALL PRIVILEGES ON *.* TO 'dart'@'%' WITH GRANT OPTION;"
          mysql -u root -e "FLUSH PRIVILEGES;"

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install Dart dependencies
        run: dart pub get

      - name: Run Dart tests on MariaDB ${{ matrix.mariadb-version }}
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: dart
          MYSQL_PASSWORD: dart
          MYSQL_DATABASE: banco_teste
          MYSQL_SECURE: "true"
        run: dart run test --concurrency 1 --chain-stack-traces --platform vm

  mysql:
    name: MySQL ${{ matrix.mysql-version }} (${{ matrix.sdk }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        sdk: [3.6.0]
        mysql-version: ['9', '9.7']

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: dart
          MYSQL_DATABASE: banco_teste
          MYSQL_USER: dart
          MYSQL_PASSWORD: dart
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -pdart --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install Dart dependencies
        run: dart pub get

      - name: Run Dart tests on MySQL ${{ matrix.mysql-version }}
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3307
          MYSQL_USER: dart
          MYSQL_PASSWORD: dart
          MYSQL_DATABASE: banco_teste
          MYSQL_SECURE: "true"
        run: dart run test --concurrency 1 --chain-stack-traces --platform vm
